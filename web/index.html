<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Inline theme bootstrap — prevents the wrong theme from flashing on first paint.
      (function () {
        try {
          var stored =
            localStorage.getItem("tempus.theme") || localStorage.getItem("tempmail.theme");
          var theme = stored || "system";
          var prefers = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark = theme === "dark" || (theme === "system" && prefers);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%8F%B3%3C/text%3E%3C/svg%3E"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tempus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
