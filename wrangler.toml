# Web worker — UI + REST API + cleanup cron.
name = "tempmail-web"
main = "src/web.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Comma-separated list of pool domains (subdomains allowed).
# Override per environment via `wrangler secret put`.
POOL_DOMAINS = "nosu.temp.zauberware.org,kuno.temp.zauberware.org,yuzo.temp.zauberware.org,tuyu.temp.zauberware.org,niri.temp.zauberware.org,kuri.temp.zauberware.org,kakoya.temp.zauberware.org,lakusu.temp.zauberware.org,situ.temp.zauberware.org,foza.temp.zauberware.org"

[[d1_databases]]
binding = "DB"
database_name = "tempmail"
database_id = "dffa33a7-26dd-4e7d-85bd-03a652d24b19"
migrations_dir = "migrations"

[triggers]
crons = ["0 * * * *"]

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# Secrets (set with `wrangler secret put <NAME>`):
#   BASIC_AUTH_USER
#   BASIC_AUTH_PASS

[[routes]]
pattern = "tempus.zauberware.org"
custom_domain = true
